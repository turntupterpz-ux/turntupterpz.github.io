<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TurntUpTerpz</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg1:#061d18;
  --bg2:#0b3a30;
  --waxA:#7cffc4;
  --waxB:#d6ffb7;
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:
    radial-gradient(circle at 20% 20%, #0f5a45 0%, transparent 40%),
    radial-gradient(circle at 80% 30%, #1a7a5d 0%, transparent 40%),
    linear-gradient(180deg,var(--bg1),var(--bg2));
  color:white;
  text-align:center;
}

/* glow blobs */
body::before, body::after{
  content:"";
  position:fixed;
  width:260px;
  height:260px;
  border-radius:50%;
  filter:blur(60px);
  opacity:.35;
}
body::before{background:#7cffc4; top:-80px; left:-80px;}
body::after{background:#d6ffb7; bottom:-80px; right:-80px;}

.container{
  max-width:420px;
  margin:auto;
  padding:50px 20px;
}

.logo{
  width:140px;
  border-radius:50%;
  box-shadow:0 15px 50px rgba(0,0,0,.7);
}

h1{margin:18px 0 6px;}
.subtitle{opacity:.7;margin-bottom:30px;}

/* BUTTON */
.button{
  position:relative;
  display:flex;
  justify-content:center;
  align-items:center;
  margin:16px 0;
  padding:18px;
  border-radius:20px;
  text-decoration:none;
  color:#05332a;
  font-weight:600;

  background:linear-gradient(135deg,var(--waxA),var(--waxB));
  overflow:hidden;

  box-shadow:
    0 12px 35px rgba(0,0,0,.5),
    inset 0 0 20px rgba(255,255,255,.1);

  transition:.15s ease;
}

/* squish */
.button:active{
  transform:scale(.93);
}

/* shimmer */
.button::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,.35),transparent 70%);
  animation:shimmer 3s linear infinite;
}
@keyframes shimmer{
  0%{transform:translateX(-100%)}
  100%{transform:translateX(100%)}
}

/* BUBBLES */
.bubble{
  position:absolute;
  bottom:-10px;
  width:10px;
  height:10px;
  background:rgba(255,255,255,.4);
  border-radius:50%;
  animation:bubble 6s infinite ease-in;
}
.b1{left:20%;}
.b2{left:50%; animation-delay:2s;}
.b3{left:75%; animation-delay:4s;}

@keyframes bubble{
  0%{transform:translateY(0) scale(.6); opacity:.4;}
  50%{opacity:.8;}
  100%{transform:translateY(-80px) scale(1.2); opacity:0;}
}

/* DRIPS */
.drip{
  position:absolute;
  top:-8px;
  width:16px;
  height:26px;
  border-radius:50%;
  background:linear-gradient(180deg,var(--waxB),var(--waxA));
  animation:drip 3.2s infinite;
}

/* sticky edge stretch */
@keyframes drip{
  0%{transform:translateY(0) scaleY(.8); opacity:0;}
  15%{opacity:1;}
  40%{transform:translateY(20px) scaleY(1.5);}
  65%{transform:translateY(42px) scaleY(.9);}
  80%{transform:translateY(55px) scaleY(1.2);} /* stretch */
  100%{transform:translateY(65px) scaleY(.5); opacity:0;}
}

.d1{left:25%;}
.d2{left:50%; animation-delay:.6s;}
.d3{left:75%; animation-delay:1.2s;}

.footer{
  margin-top:30px;
  font-size:12px;
  opacity:.5;
}
</style>
</head>

<body>

<div class="container">

<img class="logo" src="logo.png">

<h1>TurntUpTerpz</h1>
<div class="subtitle">Lock in ⤵️</div>

<!-- TELEGRAM -->
<a class="button" href="https://t.me/+ipSPiiM8HiUzOWQx" onclick="buzz()">
  ✈️ New Telegram Menu
  <div class="drip d1"></div>
  <div class="drip d2"></div>
  <div class="drip d3"></div>
  <div class="bubble b1"></div>
  <div class="bubble b2"></div>
  <div class="bubble b3"></div>
</a>

<!-- TEXT -->
<a class="button" href="sms:7079414402?body=Hey%20I%20came%20from%20your%20page" onclick="buzz()">
  💬 Text Me
  <div class="drip d1"></div>
  <div class="drip d2"></div>
  <div class="drip d3"></div>
  <div class="bubble b1"></div>
  <div class="bubble b2"></div>
  <div class="bubble b3"></div>
</a>

<div class="footer">Quality over quantity 🔥</div>

</div>

<script>
function buzz(){
  if (navigator.vibrate){
    navigator.vibrate([10, 30, 10]);
  }
}
</script>

</body>
</html>
